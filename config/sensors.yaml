# Home Assistant sensor definitions for the energy optimization agent.
# Pre-populated with Jelmer's confirmed entity IDs from live HA scan.
#
# Fields per sensor:
#   entity_id   - HA entity ID (required)
#   name        - human-readable name for prompts (required)
#   unit        - unit of measurement (optional)
#   role        - semantic role: power, energy, soc, temperature, binary, mode, price, etc.
#   group       - group label this sensor belongs to (informational)
#   is_binary   - true for binary_sensor.* entities

groups:

  # -------------------------------------------------------------------------
  - label: grid
    sensors:
      - entity_id: sensor.p1_meter_power
        name: Grid power (+ import / – export)
        unit: W
        role: power
        group: grid

      - entity_id: sensor.p1_meter_power_phase_1
        name: Grid phase 1 power
        unit: W
        role: power
        group: grid

      - entity_id: sensor.p1_meter_power_phase_2
        name: Grid phase 2 power
        unit: W
        role: power
        group: grid

      - entity_id: sensor.p1_meter_power_phase_3
        name: Grid phase 3 power
        unit: W
        role: power
        group: grid

      - entity_id: sensor.p1_meter_energy_import
        name: Grid energy import total
        unit: kWh
        role: energy
        group: grid

      - entity_id: sensor.p1_meter_energy_export
        name: Grid energy export total
        unit: kWh
        role: energy
        group: grid

      - entity_id: sensor.netstroom_import_vandaag
        name: Grid import today
        unit: kWh
        role: energy
        group: grid

      - entity_id: sensor.netstroom_export_vandaag
        name: Grid export today
        unit: kWh
        role: energy
        group: grid

      - entity_id: sensor.p1_meter_tariff
        name: Current tariff period (1=night, 2=day)
        unit: ""
        role: mode
        group: grid

  # -------------------------------------------------------------------------
