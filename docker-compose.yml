services:
  ha-agent:
    build: .
    image: ha-agent:latest
    container_name: ha-agent
    restart: unless-stopped

    # Allows the container to reach Home Assistant running on the Docker host
    extra_hosts:
      - "host.docker.internal:host-gateway"

    env_file:
      - .env

    volumes:
      # Persist analysis logs
      - ./logs:/app/logs
      # Sensors config (read-only; edit on host, container picks it up on restart)
      - ./config:/app/config:ro

    # Expose web UI port (only if ENABLE_WEB_UI=true)
    # ports:
    #   - "8080:8080"

    # Resource limits — the agent is not CPU/memory intensive
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
